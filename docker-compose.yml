   services:
     database:
       image: postgres:16
       container_name: university_postgres
       restart: always
       ports:
         - "5432:5432"
       environment:
         POSTGRES_USER: university_user
         POSTGRES_PASSWORD: university_password
         POSTGRES_DB: university_db
       volumes:
         - db_data:/var/lib/postgresql/data

     app:
       build: .
       container_name: university_app
       depends_on:
         - database
       ports:
         - "8080:8080"
       environment:
         SPRING_DATASOURCE_URL: jdbc:postgresql://database:5432/university_db
         SPRING_DATASOURCE_USERNAME: university_user
         SPRING_DATASOURCE_PASSWORD: university_password
         GEMINI_API_KEY: ${GEMINI_API_KEY}

   volumes:
     db_data:
       driver: local